<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Add Book</title></head>
<body>
<h1>Add New Book</h1>
<form th:action="@{/books/add}" th:object="${book}" method="post">
    <!-- CRITICAL: This line preserves the ID during the edit -->
    <input type="hidden" th:field="*{id}" />
    <label>Title: <input type="text" th:field="*{title}" required /></label><br/>
    <label>Author: <input type="text" th:field="*{author}" required /></label><br/>
    <label>Price: <input type="number" step="0.01" th:field="*{price}" required /></label><br/>
    <label>Copies: <input type="number" th:field="*{copies}" required /></label><br/>
    <button type="submit">Save Book</button>
</form>
<a th:href="@{/books}">Back to List</a>
</body>
</html>
