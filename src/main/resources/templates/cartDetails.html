<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Your Shopping Cart</title></head>
<body>
<h1>Your Shopping Cart</h1>
<div th:if="${cart.products.empty}">
    <p>Your cart is empty. <a th:href="@{/books}">Go shopping!</a></p>
</div>

<table border="1" th:unless="${cart.products.empty}">
    <thead>
    <tr>
        <th>Item</th>
        <th>Type</th>
        <th>Price</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="product : ${cart.products}">
        <td>
            <!-- Conditional rendering based on Class Type -->
            <span th:if="${product instanceof T(csd230.s26.lab1.entities.PublicationEntity)}"
                  th:text="${product.title}"></span>
            <span th:if="${product instanceof T(csd230.s26.lab1.entities.TicketEntity)}"
                  th:text="${product.description}"></span>
        </td>
        <td th:text="${product.productType}"></td>
        <td th:text="${'$' + product.price}"></td>
        <td><a th:href="@{/cart/remove/{id}(id=${product.id})}">Remove</a></td>
    </tr>
    </tbody>
</table>
<br/>
<a th:href="@{/books}">Back to Store</a>
</body>
</html>
